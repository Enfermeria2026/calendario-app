<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Nuevo Usuario</h2>
        <form id="registro-form">
            <input type="text" id="reg-nombre" placeholder="Nombre" required>
            <input type="text" id="reg-apellidos" placeholder="Apellidos" required>
            <input type="date" id="reg-fecha" required title="Fecha de Nacimiento">
            
            <div style="display: flex; gap: 5px;">
                <input type="text" id="reg-id" placeholder="Crea tu ID (ej: luis99)" required>
                <button type="button" id="btn-random" style="width: auto; background: #666; font-size: 11px; margin-top: 10px;">AZAR</button>
            </div>
            
            <button type="submit">Completar Registro</button>
        </form>
        <p><a href="index.html">Volver al inicio</a></p>
    </div>

    <div id="miModal" class="modal-overlay">
        <div class="modal-box">
            <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
            <div class="modal-btns" id="modalBtnsContainer"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
