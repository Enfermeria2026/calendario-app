<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Nuevo Usuario</h2>
        <form id="registro-form">
            <input type="text" id="reg-nombre" placeholder="Nombre" required>
            <input type="text" id="reg-apellidos" placeholder="Apellidos" required>
            
            <label class="label-texto">Fecha de nacimiento</label>
            <input type="date" id="reg-fecha" required>
            
            <label class="label-texto">Identificador</label>
            <div class="input-group">
                <input type="text" id="reg-id" placeholder="Crea tu ID" required>
                <button type="button" id="btn-random" style="width: auto; background: #666; font-size: 11px; margin: 0; padding: 10px;">AZAR</button>
            </div>
            
            <div class="aviso-seguridad">
                <span>🔒</span> No compartas este ID con nadie. Es único y servirá para identificarte.
            </div>
            
            <button type="submit" style="margin-top: 20px;">Completar Registro</button>
        </form>
        <p><a href="index.html">Volver al inicio</a></p>
    </div>

    <div id="miModal" class="modal-overlay">
        <div class="modal-box">
            <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
            <div id="modalExtra"></div>
            <div class="modal-btns" id="modalBtnsContainer"></div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
