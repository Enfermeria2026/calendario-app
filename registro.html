<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Crear Cuenta</h2>
        <form id="registro-form">
            <input type="text" id="reg-nombre" placeholder="Nombre" required>
            <input type="text" id="reg-apellidos" placeholder="Apellidos" required>
            <input type="date" id="reg-fecha" required title="Fecha de Nacimiento">
            <input type="email" id="reg-email" placeholder="Correo electrónico" required>
            <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" required>
            <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
    </div>
    <!-- Copia esto en index, registro y admin -->
<div id="miModal" class="modal-overlay">
    <div class="modal-box">
        <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
        <div class="modal-btns" id="modalBtnsContainer">
            <!-- Los botones se generarán por JavaScript según el aviso -->
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
