<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>¡Hola de nuevo!</h2>
        <form id="login-form">
            <input type="text" id="login-email" placeholder="Correo electrónico o Usuario" required>
            <input type="password" id="login-password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        <p>¿Aún no tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
    </div>
    <!-- Copia esto en index, registro y admin -->
<div id="miModal" class="modal-overlay">
    <div class="modal-box">
        <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
        <div class="modal-btns" id="modalBtnsContainer">
            <!-- Los botones se generarán por JavaScript según el aviso -->
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
