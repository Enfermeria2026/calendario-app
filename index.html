<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Login</title>

    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ec407a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendario">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registrado', reg))
        .catch(err => console.error('Error al registrar Service Worker', err));
    });
  }
</script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Bienvenido</h2>
        <form id="login-form">
            <label class="label-texto">Identificador</label>
            <input type="text" id="login-id" placeholder="Introduce tu ID" required>
            <button type="submit">Entrar</button>
        </form>
        <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        <p style="margin-top: 5px; font-size: 14px;"><a href="#" id="link-olvido" style="color: #ec407a;">¿Olvidaste tu identificador?</a></p>
    </div>

    <div id="miModal" class="modal-overlay">
        <div class="modal-box">
            <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
            <div id="modalExtra"></div>
            <div class="modal-btns" id="modalBtnsContainer"></div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
