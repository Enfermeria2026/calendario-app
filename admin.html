<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ec407a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendario">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registrado', reg))
        .catch(err => console.error('Error al registrar Service Worker', err));
    });
  }
</script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styleCalendario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; padding-top: 30px; background-color: #fff5f8;">
    
    <div class="auth-container" style="width: 90%; max-width: 600px; padding: 25px; box-sizing: border-box;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; color: #333;">Gestión de Usuarios</h2>
            <div id="btn-buzon" style="position: relative; cursor: pointer; font-size: 24px; color: #444;">
                <i class="fas fa-envelope"></i>
                <span id="notif-dot" style="display: none; position: absolute; top: -2px; right: -4px; background: #ff4d4d; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white;"></span>
            </div>
        </div>

        <div id="lista-usuarios">Cargando...</div>
        
        <h2 style="color: #333; margin-top: 40px; margin-bottom: 15px; text-align: center; font-size: 20px;">Calendarios Creados</h2>
        
        <div id="lista-calendarios-admin"></div>
        
        <button id="btn-cerrar-sesion" style="background: #666; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 30px; cursor: pointer; font-weight: bold; font-size: 14px;">Cerrar Sesión</button>
    </div>

    <div id="miModal" class="modal-overlay">
        <div class="modal-box">
            <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
            <div id="modalExtra" style="max-height: 60vh; overflow-y: auto;"></div>
            <div class="modal-btns" id="modalBtnsContainer"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
