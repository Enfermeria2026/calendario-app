<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin</title>
    <link rel="stylesheet" href="style.css">
    <!-- Añadimos FontAwesome para el icono del sobre -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container" style="width: 90%; max-width: 600px;">
        
        <!-- Contenedor flex para alinear el título y el buzón -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Gestión de Usuarios</h2>
            <div id="btn-buzon" style="position: relative; cursor: pointer; font-size: 24px; color: #444;">
                <i class="fas fa-envelope"></i>
                <span id="notif-dot" style="display: none; position: absolute; top: -2px; right: -4px; background: #ff4d4d; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white;"></span>
            </div>
        </div>

        <div id="lista-usuarios">Cargando...</div>
        <h2 style="color: #333; margin-top: 30px; padding: 0 15px; font-size: 20px;">Calendarios Creados</h2>
        <div id="lista-calendarios-admin" style="background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 15px;">
            </div>
        <button id="btn-cerrar-sesion" style="background: #666; margin-top: 20px;">Cerrar Sesión</button>
            </div>

    <div id="miModal" class="modal-overlay">
        <div class="modal-box">
            <p id="modalMsg" style="font-weight: bold; color: #333;"></p>
            <div id="modalExtra" style="max-height: 60vh; overflow-y: auto;"></div>
            <div class="modal-btns" id="modalBtnsContainer"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
