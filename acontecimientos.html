<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Acontecimientos - Calendario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylePerfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilos específicos para esta pantalla */
        .event-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid #ec407a; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .pagination { display: flex; justify-content: center; gap: 20px; margin: 20px 0; align-items: center; }
        .fab { position: fixed; bottom: 30px; right: 30px; background: #ec407a; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 100; transition: transform 0.2s; }
        .fab:hover { transform: scale(1.1); }
        .week-picker { display: flex; justify-content: space-between; margin-top: 10px; }
        .day-circle { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 12px; user-select: none; }
        .day-selected { background: #4CAF50 !important; color: white; border-color: #4CAF50; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="header">
        <div class="header-left">
            <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
            <span id="header-usuario">Cargando...</span>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Inicio</button>
        <button class="sidebar-btn" onclick="location.href='acontecimientos.html'"><i class="fas fa-list"></i> Mis acontecimientos</button>
        <button class="sidebar-btn" onclick="location.href='perfil.html'"><i class="fas fa-user"></i> Mi perfil</button>
        <button class="sidebar-btn" onclick="cerrarSesion()"><i class="fas fa-power-off"></i> Cerrar sesión</button>
    </div>

    <main class="main-content" style="padding-top: 90px; padding-bottom: 100px;">
        <div style="max-width: 600px; margin: 0 auto; padding: 0 15px;">
            <h2 style="margin-bottom: 20px; color: #333;">Mis Acontecimientos</h2>
            
            <div id="contenedor-eventos">
                <!-- Aquí se cargarán los eventos de 10 en 10 -->
            </div>

            <div class="pagination">
                <button id="btn-prev" class="sidebar-btn" style="width: auto; padding: 8px 20px;">Anterior</button>
                <span id="page-info">Página 1</span>
                <button id="btn-next" class="sidebar-btn" style="width: auto; padding: 8px 20px;">Siguiente</button>
            </div>
        </div>
    </main>

    <!-- BOTÓN FLOTANTE (+) -->
    <div class="fab" onclick="abrirModalEvento()">
        <i class="fas fa-plus"></i>
    </div>

    <!-- MODAL PARA AÑADIR/EDITAR EVENTO -->
    <div class="modal-overlay" id="modal-evento" style="display: none;">
        <div class="modal-box" style="max-width: 450px; text-align: left; max-height: 90vh; overflow-y: auto;">
            <h3 id="modal-titulo-accion">Nuevo Acontecimiento</h3>
            
            <label class="label-texto">Título *</label>
            <input type="text" id="ev-titulo" class="modal-input" placeholder="Ej: Turno Noche">

            <label class="label-texto">Tipo *</label>
            <select id="ev-tipo" class="modal-input" onchange="toggleTipoDetalle()">
                <option value="Trabajo">Trabajo</option>
                <option value="Escuela">Escuela</option>
                <option value="Tarea">Tarea</option>
                <option value="Evento">Evento</option>
                <option value="Otro">Otro</option>
            </select>

            <!-- Desplegable dinámico para Trabajos -->
            <div id="div-trabajo" class="hidden">
                <label class="label-texto">Selecciona el Trabajo *</label>
                <select id="ev-trabajo-select" class="modal-input"></select>
                <p id="aviso-trabajo" class="hidden" style="color: #e53935; font-size: 12px; margin-top: -10px;">⚠️ Debes añadir un trabajo en tu perfil primero.</p>
            </div>

            <!-- Campo para 'Otro' -->
            <div id="div-otro" class="hidden">
                <label class="label-texto">Especificar tipo *</label>
                <input type="text" id="ev-tipo-otro" class="modal-input">
            </div>

            <label class="label-texto">Lugar (Opcional)</label>
            <input type="text" id="ev-lugar" class="modal-input">

            <label class="label-texto">Configuración de Fecha *</label>
            <select id="ev-fecha-tipo" class="modal-input" onchange="toggleFechaDetalle()">
                <option value="especifico">Día específico</option>
                <option value="semanal">Repetir semanalmente</option>
                <option value="varios">Seleccionar varios días</option>
            </select>

            <!-- Contenedores de fechas -->
            <div id="fecha-especifico" class="fecha-seccion">
                <input type="date" id="ev-date-single" class="modal-input">
            </div>

            <div id="fecha-semanal" class="fecha-seccion hidden">
                <p style="font-size: 12px; color: #666;">Selecciona los días:</p>
                <div class="week-picker">
                    <div class="day-circle" data-day="1">L</div>
                    <div class="day-circle" data-day="2">M</div>
                    <div class="day-circle" data-day="3">X</div>
                    <div class="day-circle" data-day="4">J</div>
                    <div class="day-circle" data-day="5">V</div>
                    <div class="day-circle" data-day="6">S</div>
                    <div class="day-circle" data-day="0">D</div>
                </div>
            </div>

            <div id="fecha-varios" class="fecha-seccion hidden">
                <p style="font-size: 12px; color: #666;">Elige múltiples días:</p>
                <input type="date" id="ev-date-multiple" class="modal-input" multiple>
                <small>(Usa un calendario que permita selección múltiple o añade varios)</small>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 15px;">
                <div style="flex: 1;">
                    <label class="label-texto">Hora Inicio *</label>
                    <input type="time" id="ev-hora-inicio" class="modal-input">
                </div>
                <div style="flex: 1;">
                    <label class="label-texto">Hora Fin *</label>
                    <input type="time" id="ev-hora-fin" class="modal-input">
                </div>
            </div>

            <div class="modal-btns" style="margin-top: 25px;">
                <button onclick="cerrarModales()" style="background: #aaa;">Cancelar</button>
                <button onclick="guardarAcontecimiento()" id="btn-guardar-ev">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module" src="acontecimientos.js"></script>
</body>
</html>
