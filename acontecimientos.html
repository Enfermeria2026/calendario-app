<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Acontecimientos - Calendario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylePerfil.css">
    <link rel="stylesheet" href="styleAcontecimiento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="header">
        <div class="header-left">
            <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
            <span id="header-usuario">Cargando...</span>
        </div>
        <button class="btn-unirse">Unirse a un calendario</button>
    </nav>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Inicio</button>
        <button class="sidebar-btn" onclick="location.href='acontecimientos.html'"><i class="fas fa-list"></i> Mis acontecimientos</button>
        <button class="sidebar-btn" onclick="location.href='perfil.html'"><i class="fas fa-user"></i> Mi perfil</button>
        <button class="sidebar-btn" onclick="cerrarSesion()"><i class="fas fa-power-off"></i> Cerrar sesión</button>
    </div>

    <main class="main-content">
        <h2>Mis Acontecimientos</h2>
        <p id="subtitulo-vacio" class="hidden">No hay acontecimientos registrados.</p>
        
        <div class="barra-herramientas" id="barra-seleccion" style="display: none;">
            <button class="btn-accion-secundario" id="btn-toggle-sel" onclick="toggleModoSeleccion()">Seleccionar varios</button>
            <button class="btn-accion-secundario" id="btn-borrar-masivo" style="display: none; border-color: #e53935; color: #e53935;" onclick="borrarSeleccionados()">
                <i class="fas fa-trash"></i> Borrar seleccionados (<span id="count-sel">0</span>)
            </button>
        </div>

        <div id="contenedor-eventos"></div>

        <div class="pagination" id="paginacion-box">
            <button id="btn-prev">Anterior</button>
            <span id="page-info">Página 1 de 1</span>
            <button id="btn-next">Siguiente</button>
        </div>
    </main>

    <div class="fab" onclick="abrirModalEvento()">
        <i class="fas fa-plus"></i>
    </div>

    <div class="modal-overlay" id="modal-evento" style="display: none;">
        <div class="modal-box" style="max-width: 480px; text-align: left; max-height: 90vh; overflow-y: auto; padding: 30px;">
            <h3 id="modal-titulo-accion" style="margin-bottom: 25px; font-size: 22px;">Nuevo Acontecimiento</h3>
            
            <label class="label-texto">Título *</label>
            <input type="text" id="ev-titulo" class="modal-input" placeholder="Ej.: Turno de trabajo" style="margin-bottom: 20px;">
            
            <label class="label-texto">Tipo *</label>
            <select id="ev-tipo" class="modal-input-select" onchange="actualizarInterfazTipo()">
                <option value="" disabled selected>Selecciona un tipo...</option>
                <option value="Trabajo">Trabajo</option>
                <option value="Escuela">Escuela</option>
                <option value="Tarea">Tarea</option>
                <option value="Evento">Evento</option>
                <option value="Otro">Otro</option>
            </select>

            <div id="div-trabajo-select" class="hidden">
                <label class="label-texto">¿Qué trabajo es? *</label>
                <select id="ev-trabajo-id" class="modal-input-select"></select>
                <p id="error-no-jobs" class="hidden" style="color: #e53935; font-size: 13px; padding: 12px; background: #fff1f0; border: 1px solid #ffa39e; border-radius: 10px; margin-top: -10px; margin-bottom: 20px;">
                    <i class="fas fa-info-circle"></i> Para esta selección se requiere añadir un trabajo en tu perfil.
                </p>
            </div>

            <div id="div-otro-texto" class="hidden">
                <label class="label-texto">Especifica el tipo *</label>
                <input type="text" id="ev-otro-nombre" class="modal-input" style="margin-bottom: 20px;">
            </div>

            <label class="label-texto">Lugar (Opcional)</label>
            <input type="text" id="ev-lugar" class="modal-input" style="margin-bottom: 20px;">

            <label class="label-texto">Configuración de Fecha *</label>
            <select id="ev-fecha-tipo" class="modal-input-select" onchange="actualizarInterfazFecha()">
                <option value="especifico">Día específico</option>
                <option value="semanal">Repetir semanalmente</option>
                <option value="varios">Seleccionar varios días</option>
            </select>

            <div id="box-especifico" class="fecha-box">
                <input type="date" id="ev-date-single" class="modal-input" style="margin-bottom: 20px;">
            </div>

            <div id="box-semanal" class="fecha-box hidden">
                <div class="week-picker">
                    <div class="day-circle" data-day="1">L</div>
                    <div class="day-circle" data-day="2">M</div>
                    <div class="day-circle" data-day="3">X</div>
                    <div class="day-circle" data-day="4">J</div>
                    <div class="day-circle" data-day="5">V</div>
                    <div class="day-circle" data-day="6">S</div>
                    <div class="day-circle" data-day="0">D</div>
                </div>
                <label class="label-texto">Fecha de fin de repetición *</label>
                <input type="date" id="ev-date-end" class="modal-input" style="margin-bottom: 20px;">
            </div>

            <div id="box-varios" class="fecha-box hidden" style="margin-bottom: 20px;">
                <div class="cal-header">
                    <button class="cal-btn" id="btn-cal-prev" onclick="cambiarMesCal(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span id="cal-mes-nombre"></span>
                    <button class="cal-btn" id="btn-cal-next" onclick="cambiarMesCal(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div id="calendar-multi" class="multi-date-container"></div>
            </div>

            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label class="label-texto">Hora Inicio *</label>
                    <input type="time" id="ev-hora-ini" class="modal-input">
                </div>
                <div style="flex: 1;">
                    <label class="label-texto">Hora Fin *</label>
                    <input type="time" id="ev-hora-fin" class="modal-input">
                </div>
            </div>

            <div class="modal-btns" style="margin-top: 35px; display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="cerrarModales()" style="background: #f5f5f5; color: #666; border: 1px solid #ddd; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: auto;">Cancelar</button>
                <button onclick="validarYGuardar()" id="btn-save-event" style="background: #ec407a; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: auto;">Guardar Acontecimiento</button>
            </div>
        </div>
    </div>

    <div id="miModal" class="modal-overlay" style="display: none;">
        <div class="modal-box" style="padding: 30px; max-width: 380px;">
            <p id="modalMsg" style="font-weight: bold; color: #333; font-size: 16px; margin-bottom: 25px;"></p>
            <div id="modalExtra"></div>
            <div class="modal-btns" id="modalBtnsContainer" style="display: flex; gap: 10px; justify-content: flex-end;"></div>
        </div>
    </div>

    <script type="module" src="acontecimientos.js"></script>
</body>
</html>
