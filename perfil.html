<main class="main-content" style="padding-top: 80px;">
    
    <!-- CONTENEDOR ÚNICO PARA TODO EL PERFIL -->
    <div class="auth-container" style="max-width: 500px; margin: 20px auto; height: auto; overflow: visible;">
        
        <!-- SECCIÓN 1: DATOS PERSONALES -->
        <h2>Mi Perfil</h2>
        
        <div class="profile-pic-container">
            <div class="profile-pic" id="profile-display">
                <i class="fas fa-user"></i>
            </div>
            <label for="input-foto" class="edit-icon-photo">
                <i class="fas fa-pencil-alt"></i>
            </label>
            <input type="file" id="input-foto" accept="image/*" style="display: none;">
        </div>

        <div class="perfil-info">
            <div class="campo-editable">
                <label class="label-texto">Nombre</label>
                <div class="input-group">
                    <input type="text" id="perfil-nombre" readonly>
                    <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-nombre')"></i>
                </div>
            </div>

            <div class="campo-editable">
                <label class="label-texto">Apellidos</label>
                <div class="input-group">
                    <input type="text" id="perfil-apellidos" readonly>
                    <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-apellidos')"></i>
                </div>
            </div>

            <div class="campo-editable">
                <label class="label-texto">Fecha de nacimiento</label>
                <div class="input-group">
                    <input type="date" id="perfil-fecha" readonly>
                    <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-fecha')"></i>
                </div>
            </div>

            <div class="campo-editable">
                <label class="label-texto">Descripción libre</label>
                <div class="input-group" style="align-items: flex-start;">
                    <textarea id="perfil-desc" placeholder="Escribe algo sobre ti..." readonly></textarea>
                    <i class="fas fa-pencil-alt edit-btn" style="margin-top: 15px;" onclick="editarCampo('perfil-desc')"></i>
                </div>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <!-- SECCIÓN 2: TRABAJOS -->
        <h3 style="color: #444; font-size: 16px; text-align: left; margin-bottom: 15px;">Mis Lugares de Trabajo</h3>
        <div id="lista-trabajos" class="lista-items"></div>
        <button class="sidebar-btn" style="justify-content: center; color: #ec407a; margin-top: 10px !important;" onclick="abrirModalTrabajo()">
            <i class="fas fa-plus-circle"></i> Añadir lugar de trabajo
        </button>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <!-- SECCIÓN 3: SEGURIDAD -->
        <h3 style="color: #444; font-size: 16px; text-align: left; margin-bottom: 15px;">Seguridad</h3>
        
        <div class="campo-editable">
            <label class="label-texto">Identificador único</label>
            <div class="input-group">
                <input type="text" id="perfil-id" disabled>
                <i class="fas fa-lock" style="color: #ccc; margin-left: 10px;"></i>
            </div>
        </div>

        <!-- BOTONES DE ACCIÓN FINAL -->
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <button class="btn-principal" onclick="guardarPerfil()">Guardar Cambios</button>
            <button class="btn-principal" style="background-color: #e53935;" onclick="abrirModalEliminar()">Eliminar mi cuenta</button>
        </div>
    </div>
</main>
