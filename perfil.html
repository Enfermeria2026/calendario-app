<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Calendario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="header">
        <div class="header-left">
            <i class="fas fa-bars menu-icon" onclick="toggleMenu()"></i>
            <span id="header-usuario">Cargando...</span>
        </div>
        <button class="btn-unirse">Unirse a un calendario</button>
    </nav>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-btn" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Inicio</button>
        <button class="sidebar-btn" onclick="location.href='acontecimientos.html'"><i class="fas fa-list"></i> Mis acontecimientos</button>
        <button class="sidebar-btn" onclick="location.href='perfil.html'"><i class="fas fa-user"></i> Mi perfil</button>
        <button class="sidebar-btn" id="btn-cerrar-sesion" onclick="cerrarSesion()"><i class="fas fa-power-off"></i> Cerrar sesión</button>
    </div>

    <main class="main-content" style="display: block; padding-top: 80px;">
        
        <div class="auth-container" style="max-width: 500px; margin: 20px auto;">
            <h2>Datos Personales</h2>
            
            <div class="profile-pic-container">
                <div class="profile-pic" id="profile-display">
                    <i class="fas fa-user"></i>
                </div>
                <label for="input-foto" class="edit-icon-photo">
                    <i class="fas fa-pencil-alt"></i>
                </label>
                <input type="file" id="input-foto" accept="image/*" style="display: none;">
            </div>

            <div class="perfil-info">
                <div class="campo-editable">
                    <label class="label-texto">Nombre</label>
                    <div class="input-group">
                        <input type="text" id="perfil-nombre" readonly>
                        <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-nombre')"></i>
                    </div>
                </div>

                <div class="campo-editable">
                    <label class="label-texto">Apellidos</label>
                    <div class="input-group">
                        <input type="text" id="perfil-apellidos" readonly>
                        <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-apellidos')"></i>
                    </div>
                </div>

                <div class="campo-editable">
                    <label class="label-texto">Fecha de nacimiento</label>
                    <div class="input-group">
                        <input type="date" id="perfil-fecha" readonly>
                        <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-fecha')"></i>
                    </div>
                </div>

                <div class="campo-editable">
                    <label class="label-texto">Descripción libre</label>
                    <div class="input-group">
                        <textarea id="perfil-desc" placeholder="Cuéntanos algo sobre ti..." readonly></textarea>
                        <i class="fas fa-pencil-alt edit-btn" onclick="editarCampo('perfil-desc')"></i>
                    </div>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

            <h3 style="color: #444; font-size: 16px; text-align: left;">Mis Lugares de Trabajo</h3>
            <div id="lista-trabajos" class="lista-items">
                </div>
            <button class="sidebar-btn" style="justify-content: center; color: #ec407a;" onclick="abrirModalTrabajo()">
                <i class="fas fa-plus-circle"></i> Añadir lugar de trabajo
            </button>
        </div>

        <div class="auth-container" style="max-width: 500px; margin: 20px auto;">
            <h2>Ajustes y Seguridad</h2>
            
            <div class="campo-editable">
                <label class="label-texto">Identificador único</label>
                <div class="input-group">
                    <input type="text" id="perfil-id" readonly>
                    <i class="fas fa-lock" style="color: #ccc; margin-left: 10px;"></i>
                </div>
            </div>

            <button class="btn-principal" style="background-color: #666;" onclick="abrirModalCambiarID()">
                Cambiar Identificador
            </button>
            
            <button class="btn-principal" style="background-color: #e53935; margin-top: 10px;" onclick="confirmarEliminarCuenta()">
                Eliminar mi cuenta
            </button>
        </div>

    </main>

    <div class="modal-overlay" id="modal-trabajo">
        <div class="modal-box">
            <h3>Añadir Trabajo</h3>
            <input type="text" id="nuevo-trabajo" placeholder="Ej: Hospital Clínico - UCI">
            <div style="display: flex; gap: 10px;">
                <button class="btn-principal" style="background-color: #888;" onclick="cerrarModal()">Cancelar</button>
                <button class="btn-principal" onclick="guardarTrabajo()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="perfil.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
